version: '3.9'

services:
  db:
    container_name: monitoring-db
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - monitor_network

  backend:
    container_name: monitoring-backend
    build: ./backend
    restart: always
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    env_file:
      - .env
    environment:
      - DB_HOST=monitoring-db
    depends_on:
      - db
    ports:
      - "6300:8000"
    networks:
      - monitor_network

  frontend:
    container_name: monitoring-frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://backendmbinfrawatch.marketbytes.in/api/
    restart: always
    depends_on:
      - backend
    ports:
      - "6301:80"
    networks:
      - monitor_network

networks:
  monitor_network:
    driver: bridge

volumes:
  mysql_data:
